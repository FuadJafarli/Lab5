<!DOCTYPE html>
<html>
<head>
<style>
  body { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 40px; background: #f4f6fb; }
  .card { width: 220px; background: #fff; border-radius: 12px; box-shadow: 0 4px 16px rgba(0,0,0,0.1); overflow: hidden; display: flex; flex-direction: column; transition: transform 0.2s; }
  .card:hover { transform: translateY(-6px); }
  .img { height: 140px; display: flex; justify-content: center; align-items: center; font-size: 54px; }
  .c1 .img { background: #fde8e8; } .c2 .img { background: #e8f5e9; } .c3 .img { background: #e8eaf6; }
  .body { padding: 12px; flex: 1; }
  .name { font-weight: bold; color: #2c3e50; }
  .desc { font-size: 12px; color: #7f8c8d; margin-top: 4px; }
  .footer { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; border-top: 1px solid #ecf0f1; }
  .price { font-weight: bold; color: #e74c3c; font-size: 16px; }
  .btn { padding: 6px 12px; background: #2ecc71; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
</style>
</head>
<body>
  <div class="card c1">
    <div class="img">🎧</div>
    <div class="body"><div class="name">Sony WH-1000XM5</div><div class="desc">Səs-küy ləğvetmə, 30 saat</div></div>
    <div class="footer"><div class="price">₼349</div><button class="btn">Al</button></div>
  </div>
  <div class="card c2">
    <div class="img">⌨️</div>
    <div class="body"><div class="name">Mechanical Keyboard</div><div class="desc">RGB, alüminium korpus</div></div>
    <div class="footer"><div class="price">₼129</div><button class="btn">Al</button></div>
  </div>
  <div class="card c3">
    <div class="img">🖱️</div>
    <div class="body"><div class="name">Logitech MX Master 3</div><div class="desc">Simsiz, yüksək dəqiqlik</div></div>
    <div class="footer"><div class="price">₼89</div><button class="btn">Al</button></div>
  </div>
</body>
</html>
